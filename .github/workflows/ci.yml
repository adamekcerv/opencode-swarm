name: Swarm CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  NODE_VERSION: "22"
  CI: true

jobs:
  tests:
    name: Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Unit Tests - Protocol (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./agents/shared/test_protocol.ps1

      - name: Unit Tests - Production Standards (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./agents/shared/test_production_standards.ps1

      - name: Integration Tests - Fallback (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./agents/shared/test_fallback.ps1

      - name: Integration Tests - Disaster Recovery (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./agents/shared/test_disaster_recovery.ps1

      - name: Integration Tests - Communication (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./agents/shared/integration_tests.ps1

      - name: Configuration Tests - Docker (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./agents/shared/test_docker.ps1

      - name: Unit Tests - Protocol (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: pwsh -File ./agents/shared/test_protocol.ps1

      - name: Unit Tests - Production Standards (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: pwsh -File ./agents/shared/test_production_standards.ps1

      - name: Integration Tests - Fallback (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: pwsh -File ./agents/shared/test_fallback.ps1

      - name: Integration Tests - Disaster Recovery (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: pwsh -File ./agents/shared/test_disaster_recovery.ps1

      - name: Integration Tests - Communication (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: pwsh -File ./agents/shared/integration_tests.ps1

      - name: Configuration Tests - Docker (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: pwsh -File ./agents/shared/test_docker.ps1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build orchestrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: opencode-swarm/orchestrator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build database agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agents/db/Dockerfile
          push: false
          tags: opencode-swarm/database-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build security agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agents/security/Dockerfile
          push: false
          tags: opencode-swarm/security-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Uncomment to enable Docker image publishing
  # docker-push:
  #   name: Push Docker Images
  #   runs-on: ubuntu-latest
  #   if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
  #   needs: docker-build
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Login to GitHub Container Registry
  #       uses: docker/login-action@v3
  #       with:
  #         registry: ghcr.io
  #         username: ${{ github.actor }}
  #         password: ${{ secrets.GITHUB_TOKEN }}
  #
  #     - name: Build and push
  #       uses: docker/build-push-action@v6
  #       with:
  #         context: .
  #         push: true
  #         tags: ghcr.io/${{ github.repository }}:latest

  e2e-check:
    name: E2E Verification
    runs-on: ubuntu-latest
    needs: [tests, docker-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment assets
        shell: pwsh
        run: |
          $files = @(
            "docker-compose.yml",
            "Dockerfile",
            "agents/db/Dockerfile",
            "agents/security/Dockerfile",
            ".dockerignore",
            ".env.example",
            ".gitignore"
          )
          $missing = $files | Where-Object { -not (Test-Path $_) }
          if ($missing) { Write-Error "Missing files: $missing"; exit 1 }
          Write-Host "All deployment assets present"